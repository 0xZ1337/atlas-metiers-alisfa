# Configuration nginx pour Atlas Métiers ALISFA
# Optimisée pour vitesse + sécurité

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip (vitesse) ───
    gzip on;
    gzip_static on;             # sert les .gz pré-compressés
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/markdown
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Cache (vitesse) ───
    location ~* \.(html)$ {
        # HTML : pas de cache long pour permettre les màj rapides
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    location ~* \.(css|js|svg|woff|woff2|png|jpg|jpeg|webp|gif|ico)$ {
        # Assets statiques : cache long
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Headers de sécurité ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # Masquer la version nginx
    server_tokens off;

    # ─── Page d'accueil ───
    location = / {
        try_files /index.html =404;
    }

    # ─── Doc d'architecture (markdown brut) ───
    location = /architecture {
        rewrite ^ /ARCHITECTURE.md break;
        add_header Content-Type "text/markdown; charset=utf-8";
    }

    # ─── 404 personnalisée → renvoi vers l'accueil ───
    error_page 404 = /index.html;

    # ─── Désactiver l'accès aux fichiers cachés ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
